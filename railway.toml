# API service — Root Directory in Railway dashboard must be / (repo root).
[build]
builder = "DOCKERFILE"
dockerfilePath = "Dockerfile"
watchPatterns = [
  "apps/api/**",
  "packages/shared/**",
  "pnpm-lock.yaml",
  "pnpm-workspace.yaml",
  "Dockerfile",
  ".dockerignore",
]

[deploy]
# Production image has no pnpm — override any legacy Nixpacks/dashboard start command.
startCommand = "node dist/apps/api/src/main.js"
restartPolicyType = "ON_FAILURE"
restartPolicyMaxRetries = 3
